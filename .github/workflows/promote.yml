name: Daily memory promote

on:
  schedule:
    # Daily at 07:00 UTC (00:00 PT). Adjust if needed.
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      agent:
        description: "Agent to promote (atlas, polaris, or both)"
        required: false
        default: "both"
      dry_run:
        description: "Dry run (no file changes)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: [atlas, polaris]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Filter agent (manual runs)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.agent != 'both' && github.event.inputs.agent != matrix.agent
        run: echo "SKIP=true" >> $GITHUB_ENV

      - name: Setup Python
        if: env.SKIP != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: bin/requirements.txt

      - name: Install dependencies
        if: env.SKIP != 'true'
        run: pip install -r bin/requirements.txt

      - name: Run promote
        if: env.SKIP != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python bin/promote.py --agent ${{ matrix.agent }} ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Commit and push memory updates
        if: env.SKIP != 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "agent-cron[bot]"
          git config user.email "agent-cron@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore(${{ matrix.agent }}): daily memory promote $(date -u +%Y-%m-%d)"
            # Pull-rebase before push to handle concurrent matrix jobs.
            for i in 1 2 3; do
              git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD:${{ github.ref_name }} && break
              echo "push retry $i"
              sleep 5
            done
          fi
